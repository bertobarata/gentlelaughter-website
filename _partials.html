<!--
  _partials.html — REFERENCE FILE, NOT SERVED
  ============================================
  Reusable HTML snippets every page in the template uses. Copy-paste into
  new pages so the markup stays consistent. When you change a partial,
  remember to update every page (or use a tiny build step / SSI).

  Placeholders to replace globally on a new project:
    {{NOME_NEGOCIO}}        Full business name (e.g. "Cão na Rua")
    {{NOME_CURTO}}          Short name for nav / PWA (e.g. "CNR")
    {{TAGLINE}}             One-line tagline shown in hero
    {{SITE_DESCRIPTION}}    Meta description (≤155 chars)
    {{SITE_URL}}            Canonical URL (https://example.pt)

    {{TELEFONE_DISPLAY}}    +351 9## ### ###  (display format)
    {{TELEFONE_WHATSAPP}}   351912345678      (digits only, no +)
    {{EMAIL}}               geral@example.pt
    {{INSTAGRAM_URL}}       https://instagram.com/handle
    {{INSTAGRAM_HANDLE}}    @handle
    {{FACEBOOK_URL}}        https://facebook.com/page  (optional)
    {{FACEBOOK_NAME}}       Page Name
    {{MORADA}}              Address line
    {{HORARIO_LINHA1}}      "Segunda a Sexta: 9h–18h"
    {{HORARIO_LINHA2}}      "Sábado: 10h–14h"

    {{FORMSPREE_ENDPOINT}}  https://formspree.io/f/xxxx
    {{LOGO_FILE}}           assets/logos/logo.png

  Tip: in VSCode use Cmd+Shift+H (replace in files) to swap them all in a few seconds.
-->


<!-- ===== HEADER (paste right after <body>) ===== -->
<header class="site-header">

</header>

<footer class="site-footer">

    <div class="footer-col">

      <div class="footer-contact-line"><span>{{HORARIO_LINHA2}}</span></div>
    </div>
    <div class="footer-col">
      <h4 class="footer-title">Informações</h4>
      <div class="footer-contact-line"><a href="faq.html">Perguntas Frequentes</a></div>
