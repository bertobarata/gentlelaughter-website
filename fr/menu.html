  <script>
    (function () {
      var LANGS = ['en','fr','de'];
      var lang = (document.documentElement.lang || 'pt').toLowerCase();

      function stripLang(path) {
        var m = path.match(/^\/(en|fr|de)(\/.*)?$/);
        if (!m) return path.replace(/^\//, '') || 'index.html';
        return (m[2] || '/').replace(/^\//, '') || 'index.html';
      }
      function buildClosePath(targetLang, originPath) {
        var p = originPath || 'index.html';
        return targetLang === 'pt' ? '/' + p : '/' + targetLang + '/' + p;
      }

      // Capture origin (referrer) once per menu session
      var stored = sessionStorage.getItem('menuOrigin');
      if (!stored) {
        var ref = document.referrer;
        var originPath = 'index.html';
        if (ref) {
          try {
            var u = new URL(ref);
            if (u.origin === location.origin && !/\/menu\.html$/.test(u.pathname)) {
              originPath = stripLang(u.pathname);
            }
          } catch (e) {}
        }
        sessionStorage.setItem('menuOrigin', originPath);
        stored = originPath;
      }

      var cur = document.querySelector('[data-current-lang]');
      if (cur) cur.textContent = lang.toUpperCase();

      document.querySelectorAll('.menu-langs a').forEach(function (a) {
        var isActive = a.getAttribute('data-lang') === lang;
        a.classList.toggle('is-active', isActive);
        if (a.parentElement) a.parentElement.classList.toggle('is-current', isActive);
        a.addEventListener('click', function (e) {
          e.preventDefault();
          if (isActive) return;
          var targetLang = a.getAttribute('data-lang');
          location.replace('/' + (targetLang === 'pt' ? '' : targetLang + '/') + 'menu.html');
        });
      });

      var closeBtn = document.querySelector('.menu-close');
      if (closeBtn) {
        closeBtn.addEventListener('click', function () {
          var origin = sessionStorage.getItem('menuOrigin') || 'index.html';
          sessionStorage.removeItem('menuOrigin');
          location.assign(buildClosePath(lang, origin));
        });
      }

      document.addEventListener('click', function (e) {
        var d = document.querySelector('.menu-langs');
        if (d && d.open && !d.contains(e.target)) d.open = false;
      });
    })();
  </script>
